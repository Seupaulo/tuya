<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Control V2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-main: #ffffff;
            --text-secondary: #c4c4cc;
            --primary-blue: #007aff;
            --danger-red: #ff3b30;
            --success-green: #34c759;
            --border-color: #29292e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }

        header {
            margin-bottom: 32px;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        header h1 span {
            color: var(--primary-blue);
            font-size: 1.2rem;
            margin-left: 8px;
            font-weight: 600;
            vertical-align: middle;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            font-size: 1rem;
            font-weight: 600;
            padding: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            background-color: #29292e;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Cores limpas e de alta visibilidade */
        .btn-on { background-color: var(--success-green); }
        .btn-on:hover { background-color: #2da94c; }

        .btn-off { background-color: var(--danger-red); }
        .btn-off:hover { background-color: #d63128; }

        .btn-action { background-color: #29292e; border: 1px solid var(--border-color); }
        .btn-action:hover { background-color: #323238; border-color: #7c7c8a; }

        /* Modal de Senha Clean */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .pin-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        .pin-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 24px;
        }

        .pin-display {
            background-color: #121214;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 2.2rem;
            letter-spacing: 12px;
            margin-bottom: 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-blue);
            font-weight: 700;
        }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .pin-btn {
            font-size: 1.4rem;
            font-weight: 600;
            padding: 16px;
            border-radius: 8px;
            background-color: #202024;
            border: 1px solid transparent;
        }
        .pin-btn:active { background-color: #29292e; }

        .pin-btn.clear { color: var(--danger-red); }
        .pin-btn.cancel { color: #7c7c8a; }

        .btn-confirmar {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 16px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }
        .btn-confirmar:hover { background-color: #0062cc; }

        /* Responsividade para telas de Multimídia de carro (Landscape) */
        @media (min-width: 768px) or (orientation: landscape) and (max-height: 600px) {
            body { padding: 32px 24px; }
            .container { max-width: 900px; grid-template-columns: 1fr 1fr; display: grid; gap: 24px; }
            header { max-width: 900px; grid-column: span 2; margin-bottom: 16px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Home Control<span>V2.0</span></h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>Central de Alarme</h2>
            <div class="btn-group">
                <button class="btn-on" onclick="verificarSenha('alarme', 'ligar')">Ligar</button>
                <button class="btn-off" onclick="verificarSenha('alarme', 'desligar')">Desligar</button>
            </div>
        </div>

        <div class="card">
            <h2>Portão Garagem 1</h2>
            <div class="btn-group">
                <button class="btn-action" onclick="verificarSenha('portao', 'abrir')">Abrir</button>
                <button class="btn-action" onclick="sendCommand('portao', 'fechar')">Fechar</button>
                <button class="btn-action" onclick="sendCommand('portao', 'parar')">Parar</button>
                <button class="btn-action" onclick="sendCommand('portao', 'travar')">Travar</button>
            </div>
        </div>
    </div>

    <div id="pinModal" class="modal">
        <div class="pin-container">
            <div class="pin-title">Digite o PIN de Acesso</div>
            <div id="pinDisplay" class="pin-display"></div>
            
            <div class="pin-grid">
                <button class="pin-btn" onclick="pressNum('1')">1</button>
                <button class="pin-btn" onclick="pressNum('2')">2</button>
                <button class="pin-btn" onclick="pressNum('3')">3</button>
                <button class="pin-btn" onclick="pressNum('4')">4</button>
                <button class="pin-btn" onclick="pressNum('5')">5</button>
                <button class="pin-btn" onclick="pressNum('6')">6</button>
                <button class="pin-btn" onclick="pressNum('7')">7</button>
                <button class="pin-btn" onclick="pressNum('8')">8</button>
                <button class="pin-btn" onclick="pressNum('9')">9</button>
                <button class="pin-btn cancel" onclick="fecharModal()">ESC</button>
                <button class="pin-btn" onclick="pressNum('0')">0</button>
                <button class="pin-btn clear" onclick="limparPin()">⌫</button>
            </div>

            <button class="btn-confirmar" onclick="validarPin()">Confirmar</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ALTERE SUA SENHA DE 4 DÍGITOS AQUI ABAIXO
        // ==========================================
        const PIN_CORRETO = "1234"; 

        let pinAtual = "";
        let acaoPendente = null;

        function verificarSenha(target, action) {
            // Ações livres de senha
            if ((target === 'alarme' && action === 'ligar') || (target === 'portao' && action !== 'abrir')) {
                sendCommand(target, action);
                return;
            }
            
            // Requer senha (desarmar alarme ou abrir portão)
            acaoPendente = { target, action };
            pinAtual = "";
            document.getElementById("pinDisplay").innerText = "";
            document.getElementById("pinModal").style.display = "flex";
        }

        function pressNum(num) {
            if (pinAtual.length < 4) {
                pinAtual += num;
                document.getElementById("pinDisplay").innerText = "•".repeat(pinAtual.length);
            }
        }

        function limparPin() {
            pinAtual = "";
            document.getElementById("pinDisplay").innerText = "";
        }

        function fecharModal() {
            document.getElementById("pinModal").style.display = "none";
            pinAtual = "";
            acaoPendente = null;
        }

        // Função chamada ao clicar no botão maior de Confirmar
        function validarPin() {
            if (pinAtual === PIN_CORRETO) {
                fecharModal();
                if (acaoPendente) {
                    sendCommand(acaoPendente.target, acaoPendente.action);
                }
            } else {
                alert("Senha Incorreta!");
                limparPin();
            }
        }

        async function sendCommand(target, action) {
            try {
                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target, action })
                });
                
                const data = await response.json();
                if (!data.success) {
                    alert("Erro: " + data.message);
                }
            } catch (error) {
                alert("Erro ao conectar com o servidor.");
            }
        }
    </script>
</body>
</html>

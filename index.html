<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #f0f6fc;
            --accent-blue: #00f0ff;
            --accent-green: #39ff14;
            --accent-red: #ff3131;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent-blue);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            color: #8b949e;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-group.full-width {
            grid-template-columns: 1fr;
        }

        button {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            background-color: #21262d;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Estilos específicos dos botões baseados no tema Dolphin Mini */
        .btn-on:hover {
            background-color: rgba(57, 255, 20, 0.1);
            color: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        .btn-off:hover {
            background-color: rgba(255, 49, 49, 0.1);
            color: var(--accent-red);
            border-color: var(--accent-red);
            box-shadow: 0 0 15px rgba(255, 49, 49, 0.2);
        }

        .btn-action:hover {
            background-color: rgba(0, 240, 255, 0.1);
            color: var(--accent-blue);
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        /* Estilos do Modal de Senha */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(13, 17, 23, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .pin-pad-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
        }

        .pin-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-blue);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .pin-display {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            font-size: 2rem;
            letter-spacing: 10px;
            margin-bottom: 25px;
            height: 65px;
            color: var(--accent-blue);
        }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .pin-btn {
            font-size: 1.5rem;
            padding: 18px;
            border-radius: 50%;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #21262d;
        }

        .pin-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .pin-btn.clear {
            color: var(--accent-red);
            border-color: rgba(255, 49, 49, 0.3);
        }
        .pin-btn.clear:hover {
            background-color: rgba(255, 49, 49, 0.1);
            border-color: var(--accent-red);
        }

        .pin-btn.cancel {
            color: #8b949e;
        }

        /* Otimizações para telas maiores e multimídia (Landscape) */
        @media (min-width: 768px) or (orientation: landscape) and (max-height: 600px) {
            body {
                padding: 40px 20px;
            }
            .container {
                max-width: 800px;
                grid-template-columns: 1fr 1fr;
                display: grid;
            }
            header {
                max-width: 800px;
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Home Control</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>Central de Alarme</h2>
            <div class="btn-group">
                <button class="btn-on" onclick="verificarSenha('alarme', 'ligar')">Ligar</button>
                <button class="btn-off" onclick="verificarSenha('alarme', 'desligar')">Desligar</button>
            </div>
        </div>

        <div class="card">
            <h2>Portão Garagem 1</h2>
            <div class="btn-group">
                <button class="btn-action" onclick="verificarSenha('portao', 'abrir')">Abrir</button>
                <button class="btn-action" onclick="sendCommand('portao', 'fechar')">Fechar</button>
                <button class="btn-action" onclick="sendCommand('portao', 'parar')">Parar</button>
                <button class="btn-action" onclick="sendCommand('portao', 'travar')">Travar</button>
            </div>
        </div>
    </div>

    <div id="pinModal" class="modal">
        <div class="pin-pad-container">
            <div class="pin-title">Digite o PIN</div>
            <div id="pinDisplay" class="pin-display"></div>
            <div class="pin-grid">
                <button class="pin-btn" onclick="pressNum('1')">1</button>
                <button class="pin-btn" onclick="pressNum('2')">2</button>
                <button class="pin-btn" onclick="pressNum('3')">3</button>
                <button class="pin-btn" onclick="pressNum('4')">4</button>
                <button class="pin-btn" onclick="pressNum('5')">5</button>
                <button class="pin-btn" onclick="pressNum('6')">6</button>
                <button class="pin-btn" onclick="pressNum('7')">7</button>
                <button class="pin-btn" onclick="pressNum('8')">8</button>
                <button class="pin-btn" onclick="pressNum('9')">9</button>
                <button class="pin-btn cancel" onclick="fecharModal()">X</button>
                <button class="pin-btn" onclick="pressNum('0')">0</button>
                <button class="pin-btn clear" onclick="limparPin()">⌫</button>
            </div>
        </div>
    </div>

    <script>
        // DIGITE A SUA SENHA DE 4 DÍGITOS AQUI
        const PIN_CORRETO = "1234"; 

        let pinAtual = "";
        let acaoPendente = null;

        // Função que intercepta comandos que exigem senha
        function verificarSenha(target, action) {
            // Se for ligar o alarme, fechar, parar ou travar o portão, executa direto sem senha
            if ((target === 'alarme' && action === 'ligar') || (target === 'portao' && action !== 'abrir')) {
                sendCommand(target, action);
                return;
            }
            
            // Caso contrário (desarmar alarme ou abrir portão), abre o teclado numérico
            acaoPendente = { target, action };
            pinAtual = "";
            document.getElementById("pinDisplay").innerText = "";
            document.getElementById("pinModal").style.display = "flex";
        }

        function pressNum(num) {
            if (pinAtual.length < 4) {
                pinAtual += num;
                document.getElementById("pinDisplay").innerText = "•".repeat(pinAtual.length);
                
                // Valida automaticamente ao digitar o 4º dígito
                if (pinAtual === PIN_CORRETO) {
                    setTimeout(() => {
                        fecharModal();
                        if (acaoPendente) {
                            sendCommand(acaoPendente.target, acaoPendente.action);
                        }
                    }, 200);
                } else if (pinAtual.length === 4) {
                    // Errou a senha
                    setTimeout(() => {
                        alert("Senha Incorreta!");
                        limparPin();
                    }, 200);
                }
            }
        }

        function limparPin() {
            pinAtual = "";
            document.getElementById("pinDisplay").innerText = "";
        }

        function fecharModal() {
            document.getElementById("pinModal").style.display = "none";
            pinAtual = "";
            acaoPendente = null;
        }

        // Função padrão de envio para o Backend da Vercel
        async function sendCommand(target, action) {
            try {
                // Altere para a URL correta da sua API se necessário
                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target, action })
                });
                
                const data = await response.json();
                if (!data.success) {
                    alert("Erro: " + data.message);
                }
            } catch (error) {
                alert("Erro ao conectar com o servidor.");
            }
        }
    </script>
</body>
</html>

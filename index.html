<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Control V2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-main: #ffffff;
            --text-secondary: #c4c4cc;
            --primary-blue: #007aff;
            --danger-red: #ff3b30;
            --success-green: #34c759;
            --warning-orange: #ff9500;
            --border-color: #29292e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            justify-content: space-between;
        }

        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 32px;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        header h1 span {
            color: var(--primary-blue);
            font-size: 1.2rem;
            margin-left: 8px;
            font-weight: 600;
            vertical-align: middle;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            font-size: 1.1rem;
            font-weight: 700;
            padding: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            background-color: #29292e;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Cores cheias para os botões do Alarme */
        .btn-alarme-on { background-color: var(--success-green); color: #ffffff; border: none; }
        .btn-alarme-on:hover { background-color: #2da94c; }

        .btn-alarme-off { background-color: var(--danger-red); color: #ffffff; border: none; }
        .btn-alarme-off:hover { background-color: #d63128; }

        /* Cores apenas nas fontes para o Portão */
        .color-green { color: var(--success-green); }
        .color-orange { color: var(--warning-orange); }
        .color-gray { color: var(--text-main); }
        .color-red { color: var(--danger-red); }

        button:hover {
            background-color: #323238;
            border-color: #7c7c8a;
        }

        /* Rodapé com botão Sair */
        footer {
            margin-top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn-sair {
            background-color: #1a1a1e;
            border: 1px solid var(--danger-red);
            color: var(--danger-red);
            font-size: 0.95rem;
            font-weight: 600;
            padding: 12px 32px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-sair:hover {
            background-color: rgba(255, 59, 48, 0.1);
        }

        /* Modais Modernos (Senha e Confirmação) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .panel-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 24px;
        }

        .pin-display {
            background-color: #121214;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 2.2rem;
            letter-spacing: 12px;
            margin-bottom: 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-blue);
            font-weight: 700;
        }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .pin-btn {
            font-size: 1.4rem;
            font-weight: 600;
            padding: 16px;
            border-radius: 8px;
            background-color: #202024;
            border: 1px solid transparent;
            color: var(--text-main);
        }
        .pin-btn:active { background-color: #29292e; }
        .pin-btn.clear { color: var(--danger-red); }
        .pin-btn.cancel { color: #7c7c8a; }

        .btn-confirmar {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 16px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        /* Botões do Menu de Confirmação Rápida */
        .confirm-flex {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 12px;
        }
        .btn-sim { background-color: var(--success-green); color: white; border: none; }
        .btn-nao { background-color: #29292e; color: var(--text-secondary); }

        /* Responsividade para telas de Multimídia de carro (Landscape) */
        @media (min-width: 768px) or (orientation: landscape) and (max-height: 600px) {
            body { padding: 24px; }
            .container { max-width: 900px; grid-template-columns: 1fr 1fr; display: grid; gap: 24px; }
            header { max-width: 900px; grid-column: span 2; margin-bottom: 8px; }
            footer { margin-top: 24px; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <header>
            <h1>Home Control<span>V2.1</span></h1>
        </header>

        <div class="container">
            <div class="card">
                <h2>Central de Alarme</h2>
                <div class="btn-group">
                    <button class="btn-alarme-on" onclick="solicitarAcao('alarme', 'ligar', 'Deseja LIGAR o Alarme?')">Ligar</button>
                    <button class="btn-alarme-off" onclick="solicitarAcao('alarme', 'desligar')">Desligar</button>
                </div>
            </div>

            <div class="card">
                <h2>Portão Garagem 1</h2>
                <div class="btn-group">
                    <button class="color-green" onclick="solicitarAcao('portao', 'abrir')">Abrir</button>
                    <button class="color-orange" onclick="solicitarAcao('portao', 'fechar', 'Deseja FECHAR o Portão?')">Fechar</button>
                    <button class="color-gray" onclick="solicitarAcao('portao', 'parar', 'Deseja PARAR o Portão?')">Parar</button>
                    <button class="color-red" onclick="solicitarAcao('portao', 'travar', 'Deseja TRAVAR o Portão?')">Travar</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <button class="btn-sair" onclick="sairDoPainel()">Sair do Painel</button>
    </footer>

    <div id="pinModal" class="modal">
        <div class="panel-container">
            <div class="panel-title">Digite o PIN de Acesso</div>
            <div id="pinDisplay" class="pin-display"></div>
            
            <div class="pin-grid">
                <button class="pin-btn" onclick="pressNum('1')">1</button>
                <button class="pin-btn" onclick="pressNum('2')">2</button>
                <button class="pin-btn" onclick="pressNum('3')">3</button>
                <button class="pin-btn" onclick="pressNum('4')">4</button>
                <button class="pin-btn" onclick="pressNum('5')">5</button>
                <button class="pin-btn" onclick="pressNum('6')">6</button>
                <button class="pin-btn" onclick="pressNum('7')">7</button>
                <button class="pin-btn" onclick="pressNum('8')">8</button>
                <button class="pin-btn" onclick="pressNum('9')">9</button>
                <button class="pin-btn cancel" onclick="fecharModal()">ESC</button>
                <button class="pin-btn" onclick="pressNum('0')">0</button>
                <button class="pin-btn clear" onclick="limparPin()">⌫</button>
            </div>

            <button class="btn-confirmar" onclick="validarPin()">Confirmar</button>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="panel-container">
            <div id="confirmMessage" class="panel-title">Deseja executar esta ação?</div>
            <div class="confirm-flex">
                <button class="btn-sim" onclick="executarConfirmado()">SIM</button>
                <button class="btn-nao" onclick="fecharConfirmacao()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const PIN_CORRETO = "1234"; // Altere sua senha de 4 dígitos aqui se quiser

        let pinAtual = "";
        let acaoPendente = null;

        // Gerencia se a ação abre teclado de senha ou a janela interna de confirmação
        function solicitarAcao(target, action, mensagemConfirmacao = null) {
            // Ações críticas: Senha obrigatória
            if ((target === 'alarme' && action === 'desligar') || (target === 'portao' && action === 'abrir')) {
                acaoPendente = { target, action };
                pinAtual = "";
                document.getElementById("pinDisplay").innerText = "";
                document.getElementById("pinModal").style.display = "flex";
                return;
            }
            
            // Outras ações: Confirmação em tela estilo App
            if (mensagemConfirmacao) {
                acaoPendente = { target, action };
                document.getElementById("confirmMessage").innerText = mensagemConfirmacao;
                document.getElementById("confirmModal").style.display = "flex";
            } else {
                sendCommand(target, action);
            }
        }

        function pressNum(num) {
            if (pinAtual.length < 4) {
                pinAtual += num;
                document.getElementById("pinDisplay").innerText = "•".repeat(pinAtual.length);
            }
        }

        function limparPin() {
            pinAtual = "";
            document.getElementById("pinDisplay").innerText = "";
        }

        function fecharModal() {
            document.getElementById("pinModal").style.display = "none";
            pinAtual = "";
            acaoPendente = null;
        }

        function validarPin() {
            if (pinAtual === PIN_CORRETO) {
                fecharModal();
                if (acaoPendente) {
                    sendCommand(acaoPendente.target, acaoPendente.action);
                }
            } else {
                alert("Senha Incorreta!");
                limparPin();
            }
        }

        // Funções do Modal de Confirmação Integrado
        function executarConfirmado() {
            document.getElementById("confirmModal").style.display = "none";
            if (acaoPendente) {
                sendCommand(acaoPendente.target, acaoPendente.action);
                acaoPendente = null;
            }
        }

        function fecharConfirmacao() {
            document.getElementById("confirmModal").style.display = "none";
            acaoPendente = null;
        }

        function sairDoPainel() {
            window.close();
            setTimeout(() => { window.history.back(); }, 300);
        }

        async function sendCommand(target, action) {
            try {
                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target, action })
                });
                
                const data = await response.json();
                if (!data.success) {
                    alert("Erro: " + data.message);
                }
            } catch (error) {
                alert("Erro ao conectar com o servidor.");
            }
        }
    </script>
</body>
</html>
